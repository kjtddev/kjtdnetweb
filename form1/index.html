<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | KJTD</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* The Financial Times "Salmon" Pink */
            --ft-pink: #fff1e5;
            --text-dark: #1a1a1a;
            --border-color: rgba(0, 0, 0, 0.15);
            --success-green: #006633;
        }

        body {
            background-color: var(--ft-pink);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            width: 100%;
            max-width: 550px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Large Serif Typography */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        p.subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-style: italic;
            margin-bottom: 3rem;
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 2.5rem;
            position: relative;
        }

        label {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border-color);
            font-size: 1.2rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-bottom-color: var(--text-dark);
        }

        button {
            background-color: var(--text-dark);
            color: white;
            padding: 18px 45px;
            border: none;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s active, opacity 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Status Messages */
        #status {
            margin-top: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        #status.success {
            color: var(--success-green);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
        }

        #status.error {
            color: #cc0000;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Get in touch.</h1>
        <p class="subtitle">Direct inquiries for admin@kjtd.net</p>

        <form id="my-form" action="https://formspree.io/f/xgopdkrq" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Ex. Alexander Hamilton">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="email@domain.com">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <input type="text" id="message" name="message" required placeholder="How can we help?">
            </div>

            <button id="my-form-button">Submit Request</button>
            <p id="status"></p>
        </form>
    </div>

    <script>
        var form = document.getElementById("my-form");
        
        async function handleSubmit(event) {
          event.preventDefault();
          var status = document.getElementById("status");
          var data = new FormData(event.target);
          
          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
          }).then(response => {
            if (response.ok) {
              status.innerHTML = "Thank you! Your message has been sent.";
              status.classList.add("success");
              form.reset();
              // Hide button after success
              document.getElementById("my-form-button").style.display = "none";
            } else {
              response.json().then(data => {
                if (Object.hasOwn(data, 'errors')) {
                  status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                } else {
                  status.innerHTML = "Oops! There was a problem submitting your form";
                }
                status.classList.add("error");
              })
            }
          }).catch(error => {
            status.innerHTML = "Oops! There was a problem submitting your form";
            status.classList.add("error");
          });
        }
        form.addEventListener("submit", handleSubmit)
    </script>

</body>
</html>
