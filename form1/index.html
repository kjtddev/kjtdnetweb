<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* FT Salmon/Paper Color */
            --bg-color: #fff1e5; 
            /* Muted Taupe from your image */
            --text-color: #b5b1a9; 
            /* Darker focus color */
            --text-focus: #33302e; 
            --line-color: rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Instrument Serif', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .form-container {
            width: 100%;
            max-width: 600px;
        }

        .input-group {
            position: relative;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--line-color);
        }

        /* The Label (The big serif text in your image) */
        .input-group label {
            font-size: clamp(3rem, 10vw, 5rem);
            display: block;
            line-height: 1.1;
            letter-spacing: -0.02em;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .optional {
            font-size: 0.4em; /* Shrinks the (optional) text */
            vertical-align: middle;
            margin-left: 10px;
            opacity: 0.7;
        }

        /* The actual input field hidden behind/under the label */
        input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Instrument Serif', serif;
            font-size: 2rem;
            padding: 10px 0;
            color: var(--text-focus);
            outline: none;
            /* Keeps the label visible until user types */
        }

        input::placeholder {
            color: transparent;
        }

        /* Styling for when the user is typing */
        .input-group:focus-within {
            border-bottom-color: var(--text-focus);
        }
        
        .input-group:focus-within label {
            color: var(--text-focus);
        }

        button {
            margin-top: 40px;
            background: var(--text-focus);
            color: var(--bg-color);
            border: none;
            padding: 15px 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        #status.success {
            margin-top: 20px;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--text-focus);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Tell me</h1>
        <form id="my-form" action="https://formspree.io/f/xgopdkrq" method="POST">
            
            <div class="input-group">
                <label for="first">First</label>
                <input type="text" id="first" name="first_name" required>
            </div>

            <div class="input-group">
                <label for="middle">Middle <span class="optional">(optional)</span></label>
                <input type="text" id="middle" name="middle_name">
            </div>

            <div class="input-group">
                <label for="last">Last</label>
                <input type="text" id="last" name="last_name" required>
            </div>

            <div class="input-group" style="margin-top: 40px;">
                <label for="email" style="font-size: 2.5rem;">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-group" style="margin-top: 40px;">
                <label for="message" style="font-size: 2.5rem;">Your Message</label>
                <input type="text" id="message" name="message" required>
            </div>
            
            <button id="my-form-button">Submit</button>
            <p id="status"></p>
        </form>
    </div>

    <script>
        var form = document.getElementById("my-form");
        async function handleSubmit(event) {
          event.preventDefault();
          var status = document.getElementById("status");
          var data = new FormData(event.target);
          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
          }).then(response => {
            if (response.ok) {
              status.innerHTML = "Success. We have received your details.";
              status.className = "success";
              form.reset();
              document.getElementById("my-form-button").style.display = "none";
            } else {
              status.innerHTML = "Error submitting form.";
            }
          }).catch(error => {
            status.innerHTML = "Connection error.";
          });
        }
        form.addEventListener("submit", handleSubmit)
    </script>

</body>
</html>
