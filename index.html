<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>KJTD.NET | Global ISP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Fixes scrolling */
            background-color: #000;
        }

        /* Full Screen Data Center Background */
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1558494949-ef010cbdcc51?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers main content */
            align-items: center;
            text-align: center;
            position: relative;
        }

        .main-content {
            z-index: 1;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: 4px;
            color: #ADD8E6; /* Light Blue */
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* Links Grid */
        .links-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-link {
            text-decoration: none;
            color: #ADD8E6;
            border: 1px solid #ADD8E6;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .nav-link:hover {
            color: #00FFFF; /* Cyan */
            border-color: #00FFFF;
            background: rgba(0, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Bottom Contact Section (Sticky to bottom) */
        .footer-contact {
            position: absolute;
            bottom: 30px;
            width: 100%;
        }

        .contact-btn {
            font-size: 0.85rem;
            text-decoration: none;
            color: #ADD8E6;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .contact-btn:hover {
            color: #00FFFF;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .links-grid {
                flex-direction: column;
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <main class="hero-bg">
        <div class="main-content">
            <h1>KJTD.NET</h1>
            <p class="subtitle">A Global Internet Service Provider</p>

            <div class="links-grid">
                <a href="https://bgp.he.net/AS399992" target="_blank" class="nav-link">bgp.he.net</a>
                <a href="https://bgp.tools/as/399992" target="_blank" class="nav-link">bgp.tools</a>
                <a href="https://www.peeringdb.com/net/27844" target="_blank" class="nav-link">PeeringDB</a>
            </div>
        </div>

        <div class="footer-contact">
            <a href="https://kjtd.net/form1" class="contact-btn">Contact Us</a>
        </div>
    </main>

</body>
</html>
