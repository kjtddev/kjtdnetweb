<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>KJTD.NET | Global ISP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Reset and Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevents scrolling */
            color: #ffffff;
        }

        /* Full Screen Background with Overlay */
        .hero-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1558494949-ef010cbdcc51?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 900px;
            padding: 20px;
            z-index: 1;
        }

        /* Headings */
        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 10px;
            color: #ADD8E6; /* Light Blue */
            text-transform: uppercase;
        }

        .subtitle {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 300;
            margin-bottom: 50px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 2px;
        }

        /* Grid Layout */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }

        @media (max-width: 600px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
            body { overflow-y: auto; } /* Allow scroll on small mobile if needed */
        }

        /* Link/Button Styling */
        .nav-link {
            display: block;
            text-decoration: none;
            color: #ADD8E6;
            border: 1px solid rgba(173, 216, 230, 0.3);
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .nav-link:hover {
            color: #00FFFF; /* Cyan Hover */
            border-color: #00FFFF;
            background: rgba(0, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* Contact Link */
        .contact-btn {
            font-size: 1.5rem;
            text-decoration: none;
            color: #ADD8E6;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .contact-btn:hover {
            color: #00FFFF;
            border-bottom: 2px solid #00FFFF;
        }

        /* Animation */
        .fade-in {
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <main class="hero-bg">
        <div class="container fade-in">
            <h1>KJTD.NET</h1>
            <p class="subtitle">A Global Internet Service Provider</p>

            <div class="links-grid">
                <a href="https://bgp.he.net/AS399992" target="_blank" class="nav-link">bgp.he.net</a>
                <a href="https://bgp.tools/as/399992" target="_blank" class="nav-link">bgp.tools</a>
                <a href="https://www.peeringdb.com/net/27844" target="_blank" class="nav-link">PeeringDB</a>
            </div>

            <div class="contact-section">
                <a href="https://kjtd.net/form1" class="contact-btn">Contact Us</a>
            </div>
        </div>
    </main>

</body>
</html>
